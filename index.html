<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Carousel Preview</title>
    <style>
        body { 
            font-family: -apple-system, sans-serif; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            background: #1a1a1a; 
            color: white; 
            margin: 0;
            padding: 20px;
        }

        .phone-wrapper {
            position: relative;
            width: 375px;
            height: 469px; 
            border: 4px solid #333; 
            border-radius: 8px; 
            overflow: hidden;
            background: #000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .carousel { 
            display: flex; 
            overflow-x: auto; 
            scroll-snap-type: x mandatory; 
            width: 100%; 
            height: 100%; 
            scrollbar-width: none; 
            cursor: grab; 
        }

        .carousel::-webkit-scrollbar { display: none; }
        .carousel:active { cursor: grabbing; }

        .slide { 
            flex: 0 0 100%; 
            width: 100%; 
            scroll-snap-align: start;
            scroll-snap-stop: always; 
            position: relative; 
        }

        iframe {
            width: 100%;
            height: 100%;
            pointer-events: none; 
        }

        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 15%; 
            background-color: rgba(255, 0, 0, 0.4); 
            border-top: 2px dashed red;
            pointer-events: none;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .overlay-text {
            color: white;
            font-weight: bold;
            font-size: 12px;
            text-shadow: 1px 1px 2px black;
        }

        .controls { margin-bottom: 15px; text-align: center; }
        button {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin: 0 5px;
        }

        #audio-btn {
            background: #007bff;
            border-color: #0056b3;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="controls">
        <h2>4:5 Ad Preview Tool</h2>
        <button id="audio-btn" onclick="toggleAudio()">Enable Audio 🔊</button>
        <button onclick="toggleOverlay()">Toggle Meta UI Danger Zone</button>
    </div>

    <div class="phone-wrapper">
        <div id="ui-overlay" class="overlay" style="display:none;">
            <span class="overlay-text">UI OVERLAY AREA (AVOID TEXT HERE)</span>
        </div>

        <div class="carousel" id="slider"></div>
    </div>

    <script src="https://player.vimeo.com/api/player.js"></script>

    <script>
        const carouselSets = {
            "1": [
                "https://player.vimeo.com/video/1173046514?h=24436ec4c2&background=1",
                "https://player.vimeo.com/video/1173046547?h=9b36540f2a&background=1",
                "https://player.vimeo.com/video/1173046561?h=62bdab01e8&background=1"
            ],
            "2": [
                "https://player.vimeo.com/video/1183164857?h=9844906e18&background=1",
                "https://player.vimeo.com/video/1183172215?h=da69d1aad4&background=1",
                "https://player.vimeo.com/video/1183172080?h=3852270e21&background=1"
            ]
        };

        const params = new URLSearchParams(window.location.search);
        const selectedSet = params.get("set") || "1";
        const videoList = carouselSets[selectedSet] || carouselSets["1"];

        const slider = document.getElementById('slider');

        slider.innerHTML = videoList.map(videoUrl => `
            <div class="slide">
                <iframe src="${videoUrl}" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>
            </div>
        `).join('');

        const iframes = document.querySelectorAll('iframe');
        const slides = document.querySelectorAll('.slide');
        const players = Array.from(iframes).map(iframe => new Vimeo.Player(iframe));

        let isAudioOn = false;
        let currentPlayerIndex = 0;

        function toggleAudio() {
            isAudioOn = !isAudioOn;
            const btn = document.getElementById('audio-btn');

            players.forEach((player, index) => {
                if (index === currentPlayerIndex && isAudioOn) {
                    player.setVolume(1);
                } else {
                    player.setVolume(0);
                }
            });

            btn.innerHTML = isAudioOn ? "Mute Audio 🔇" : "Enable Audio 🔊";
            btn.style.background = isAudioOn ? "#dc3545" : "#007bff";
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const index = Array.from(slides).indexOf(entry.target);
                const player = players[index];

                if (!player) return;

                if (entry.isIntersecting) {
                    currentPlayerIndex = index;

                    player.play().then(() => {
                        player.setCurrentTime(0);
                        if (isAudioOn) {
                            player.setVolume(1);
                        }
                    }).catch(error => {
                        console.log("Autoplay prevented or interrupted:", error);
                    });
                } else {
                    player.pause();
                    player.setVolume(0);
                }
            });
        }, {
            root: slider,
            threshold: 0.6
        });

        slides.forEach(slide => observer.observe(slide));

        function toggleOverlay() {
            const x = document.getElementById("ui-overlay");
            x.style.display = (x.style.display === "none") ? "flex" : "none";
        }

        let isDown = false;
        let startX;
        let scrollLeft;

        slider.addEventListener('mousedown', (e) => {
            isDown = true;
            startX = e.pageX - slider.offsetLeft;
            scrollLeft = slider.scrollLeft;
        });

        slider.addEventListener('mouseleave', () => { isDown = false; });
        slider.addEventListener('mouseup', () => { isDown = false; });

        slider.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - slider.offsetLeft;
            const walk = (x - startX) * 1.5;
            slider.scrollLeft = scrollLeft - walk;
        });
    </script>
</body>
</html>
