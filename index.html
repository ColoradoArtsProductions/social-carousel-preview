<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Carousel Preview</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; background: #111; color: white; }
        .carousel { display: flex; overflow-x: auto; snap-type: x mandatory; width: 375px; height: 667px; border: 4px solid #333; border-radius: 20px; }
        .slide { flex: 0 0 100%; snap-align: start; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        .hint { text-align: center; margin-top: 10px; color: #888; }
    </style>
</head>
<body>
    <div>
        <h2 style="text-align: center;">Draft Carousel</h2>
        <div class="slide">
            <iframe src="https://player.vimeo.com/video/1173046514?h=24436ec4c2&badge=0&autopause=0" 
                width="100%" height="100%" frameborder="0" 
                allow="autoplay; fullscreen; picture-in-picture" allowfullscreen>
            </iframe>
            <iframe src="https://player.vimeo.com/video/1173046547?h=9b36540f2a&badge=0&autopause=0"
                width="100%" height="100%" frameborder="0" 
                allow="autoplay; fullscreen; picture-in-picture" allowfullscreen>
            </iframe>
            <iframe src="https://player.vimeo.com/video/1173046561?h=62bdab01e8&badge=0&autopause=0"
                width="100%" height="100%" frameborder="0" 
                allow="autoplay; fullscreen; picture-in-picture" allowfullscreen>
            </iframe>
        </div>
        <p class="hint">← Swipe to view videos →</p>
    </div>
</body>
</html>
