<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Carousel Preview</title>
    <style>
        /* Centers the 'Phone' on the screen */
        body { 
            font-family: -apple-system, sans-serif; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            background: #1a1a1a; 
            color: white; 
            margin: 0;
            padding: 20px;
        }
    
        /* The 'Phone' Frame */
        .phone-wrapper {
            position: relative;
            width: 375px;
            height: 667px;
            border: 12px solid #333;
            border-radius: 40px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
    
        .carousel { 
            display: flex; 
            overflow-x: auto; 
            snap-type: x mandatory; 
            width: 100%; 
            height: 100%; 
            scrollbar-width: none; 
        }
        .carousel::-webkit-scrollbar { display: none; }
    
        .slide { 
            flex: 0 0 100%; 
            width: 100%; 
            snap-align: start; 
            position: relative; 
        }
    
        /* Meta/Instagram Overlay Mockup */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let clicks pass through to the video */
            background: url('https://i.imgur.com/8Yv6Z6X.png'); /* Replace with a PNG of IG UI if you have one */
            border: 2px dashed rgba(255,255,255,0.3); /* Visual safe zone guide */
            display: block;
        }
    
        .controls { margin-bottom: 15px; text-align: center; }
        button { background: #333; color: white; border: 1px solid #555; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="controls">
        <h2>Ad Preview Tool</h2>
        <button onclick="toggleOverlay()">Toggle Meta UI Overlay</button>
    </div>

    <div class="phone-wrapper">
        <div id="ui-overlay" class="overlay" style="display:none;">
            <div style="position:absolute; bottom:100px; left:20px; color:white; font-size:12px;">
                <strong>@yourbrand</strong><br>Check out our new summer reel... #design
            </div>
        </div>

        <div class="carousel">
            <div class="slide">
                <iframe src="https://player.vimeo.com/video/1173046514?h=24436ec4c2&badge=0&autopause=0" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>
            </div>
            <div class="slide">
                <iframe src="https://player.vimeo.com/video/1173046547?h=9b36540f2a&badge=0&autopause=0" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>
            </div>
            <div class="slide">
                <iframe src="https://player.vimeo.com/video/1173046561?h=62bdab01e8&badge=0&autopause=0" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script>
        function toggleOverlay() {
            var x = document.getElementById("ui-overlay");
            x.style.display = (x.style.display === "none") ? "block" : "none";
        }
    </script>
</body>
</html>
