<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Carousel Preview</title>
    <style>
        body { 
            font-family: -apple-system, sans-serif; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            background: #1a1a1a; 
            color: white; 
            margin: 0;
            padding: 20px;
        }

        .phone-wrapper {
            position: relative;
            width: 375px;
            height: 469px; 
            border: 4px solid #333; 
            border-radius: 8px; 
            overflow: hidden;
            background: #000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .carousel { 
            display: flex; 
            overflow-x: auto; 
            scroll-snap-type: x mandatory; 
            width: 100%; 
            height: 100%; 
            scrollbar-width: none; 
            cursor: grab; 
        }
        .carousel::-webkit-scrollbar { display: none; }
        
        .carousel:active {
            cursor: grabbing; 
        }

        .slide { 
            flex: 0 0 100%; 
            width: 100%; 
            scroll-snap-align: start;
            scroll-snap-stop: always; 
            position: relative; 
        }

        iframe {
            width: 100%;
            height: 100%;
            pointer-events: none; 
        }

        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 15%; 
            background-color: rgba(255, 0, 0, 0.4); 
            border-top: 2px dashed red;
            pointer-events: none;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .overlay-text {
            color: white;
            font-weight: bold;
            font-size: 12px;
            text-shadow: 1px 1px 2px black;
        }

        .controls { margin-bottom: 15px; text-align: center; }
        button { background: #333; color: white; border: 1px solid #555; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin: 0 5px; }
        
        /* Highlighting the audio button */
        #audio-btn { background: #007bff; border-color: #0056b3; font-weight: bold; }
    </style>
</head>
<body>
    <div class="controls">
        <h2>4:5 Ad Preview Tool</h2>
        <button id="audio-btn" onclick="toggleAudio()">Enable Audio 🔊</button>
        <button onclick="toggleOverlay()">Toggle Meta UI Danger Zone</button>
    </div>

    <div class="phone-wrapper">
        <div id="ui-overlay" class="overlay" style="display:none;">
            <span class="overlay-text">UI OVERLAY AREA (AVOID TEXT HERE)</span>
        </div>

        <div class="carousel" id="slider">
            <div class="slide">
                <iframe src="https://player.vimeo.com/video/1173046514?h=24436ec4c2&background=1" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>
            </div>
            <div class="slide">
                <iframe src="https://player.vimeo.com/video/1173046547?h=9b36540f2a&background=1" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>
            </div>
            <div class="slide">
                <iframe src="https://player.vimeo.com/video/1173046561?h=62bdab01e8&background=1" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script src="https://player.vimeo.com/api/player.js"></script>
    
    <script>
        // 2. Audio Toggle Logic
        const iframes = document.querySelectorAll('iframe');
        const players = Array.from(iframes).map(iframe => new Vimeo.Player(iframe));
        let isAudioOn = false;

        function toggleAudio() {
            isAudioOn = !isAudioOn;
            const btn = document.getElementById('audio-btn');
            
            // Turn volume up to 1 (100%) or down to 0
            players.forEach(player => {
                player.setVolume(isAudioOn ? 1 : 0);
            });
            
            // Update the button text
            btn.innerHTML = isAudioOn ? "Mute Audio 🔇" : "Enable Audio 🔊";
            btn.style.background = isAudioOn ? "#dc3545" : "#007bff"; // Changes color to red when audio is on
        }

        // Overlay Toggle Logic
        function toggleOverlay() {
            var x = document.getElementById("ui-overlay");
            x.style.display = (x.style.display === "none") ? "flex" : "none";
        }

        // Click and Drag Swipe Logic
        const slider = document.getElementById('slider');
        let isDown = false;
        let startX;
        let scrollLeft;

        slider.addEventListener('mousedown', (e) => {
            isDown = true;
            startX = e.pageX - slider.offsetLeft;
            scrollLeft = slider.scrollLeft;
        });
        slider.addEventListener('mouseleave', () => { isDown = false; });
        slider.addEventListener('mouseup', () => { isDown = false; });
        slider.addEventListener('mousemove', (e) => {
            if(!isDown) return;
            e.preventDefault();
            const x = e.pageX - slider.offsetLeft;
            const walk = (x - startX) * 1.5; 
            slider.scrollLeft = scrollLeft - walk;
        });
    </script>
</body>
</html>
