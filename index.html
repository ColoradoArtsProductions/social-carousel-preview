<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Carousel Preview</title>
    <style>
        /* Centers the 'Phone' on the screen */
        body { 
            font-family: -apple-system, sans-serif; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            background: #1a1a1a; 
            color: white; 
            margin: 0;
            padding: 20px;
        }
    
        /* The 'Phone' Frame */
        .phone-wrapper {
            position: relative;
            width: 375px;
            height: 667px;
            border: 12px solid #333;
            border-radius: 40px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
    
        .carousel { 
            display: flex; 
            overflow-x: auto; 
            /* This forces the snap behavior */
            scroll-snap-type: x mandatory; 
            /* Smooths out the movement */
            scroll-behavior: smooth;
            width: 100%; 
            height: 100%; 
            scrollbar-width: none; 
        }
        .carousel::-webkit-scrollbar { display: none; }
    
        .slide { 
            flex: 0 0 100%; 
            width: 100%; 
            /* This tells the slide to stick to the start of the container */
            scroll-snap-align: start; 
            /* Prevents any weird overlapping */
            scroll-snap-stop: always; 
            position: relative; 
        }
    
        /* Meta/Instagram Overlay Mockup */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Crucial: lets you still click 'Play' on the video */
            z-index: 10;
            /* This adds a gradient at the bottom so the white text is readable */
            background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 30%);
            border: 2px dashed rgba(255,255,255,0.3); /* Shows the 'Safe Zone' */
        }
    
        .controls { margin-bottom: 15px; text-align: center; }
        button { background: #333; color: white; border: 1px solid #555; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="controls">
        <h2>Ad Preview Tool</h2>
        <button onclick="toggleOverlay()">Toggle Meta UI Overlay</button>
    </div>

    <div class="phone-wrapper">
        <div id="ui-overlay" class="overlay" style="display:none;">
            <img src="https://i.imgur.com/8pA0pS6.png" style="width:100%; height:100%; object-fit:contain; opacity:0.9;">
            
            <div style="position:absolute; bottom:60px; left:15px; color:white; font-size:13px; text-shadow: 1px 1px 2px black;">
                <strong>@coloradoartsproductions</strong><br>
                Draft 1: Social Carousel Concept<br>
                <span style="color:#aaa;">#production #bts #socialmedia</span>
            </div>
        </div>

        <div class="carousel">
            <div class="slide">
                <iframe src="https://player.vimeo.com/video/1173046514?h=24436ec4c2&badge=0&autopause=0" frameborder="0" allow="autoplay; fullscreen" allowfullscreen
                    width="100%" height="100%" frameborder="0" 
                    allow="autoplay; fullscreen; picture-in-picture" allowfullscreen>
                </iframe>
            </div>
            <div class="slide">
                <iframe src="https://player.vimeo.com/video/1173046547?h=9b36540f2a&badge=0&autopause=0" frameborder="0" allow="autoplay; fullscreen" allowfullscreen
                    width="100%" height="100%" frameborder="0" 
                    allow="autoplay; fullscreen; picture-in-picture" allowfullscreen>
                </iframe>
            </div>
            <div class="slide">
                <iframe src="https://player.vimeo.com/video/1173046561?h=62bdab01e8&badge=0&autopause=0" frameborder="0" allow="autoplay; fullscreen" allowfullscreen
                    width="100%" height="100%" frameborder="0"
                    allow="autoplay; fullscreen; picture-in-picture" allowfullscreen>
                </iframe>
            </div>
        </div>
    </div>

    <script>
        function toggleOverlay() {
            var x = document.getElementById("ui-overlay");
            x.style.display = (x.style.display === "none") ? "block" : "none";
        }
    </script>
</body>
</html>
